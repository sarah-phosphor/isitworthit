# Netlify config for doesitmatter.fyi
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# SPA fallback. Netlify serves /.netlify/functions/* before this rule, so the
# data endpoint is unaffected.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
